<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中当て人数管理</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        
        /* 人数表示エリア */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .box { padding: 15px; border-radius: 12px; background: #f8f9fa; border: 2px solid #eee; }
        .label { font-size: 0.9rem; color: #666; display: block; margin-bottom: 5px; }
        .num { font-size: 2.5rem; font-weight: bold; color: #333; }
        .in-box { border-color: #007bff; background: #e7f1ff; }
        
        /* メインアクションボタン */
        .hit-btn { 
            width: 100%; height: 120px; font-size: 1.5rem; font-weight: bold; color: white;
            background-color: #007bff; border: none; border-radius: 15px; cursor: pointer;
            box-shadow: 0 6px 0 #0056b3; transition: all 0.1s; margin-bottom: 20px;
        }
        .hit-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0056b3; }
        .hit-btn:disabled { background: #ccc; box-shadow: none; transform: translateY(4px); cursor: not-allowed; }

        /* 救済・リセット */
        .footer-btns { display: flex; gap: 10px; }
        .undo-btn { flex: 2; padding: 12px; background: #ffc107; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .reset-btn { flex: 1; padding: 12px; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        
        .finish-msg { color: #dc3545; font-weight: bold; margin-top: 15px; height: 1.5rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0;">中当て管理</h2>
    
    <div class="status-grid">
        <div class="box in-box">
            <span class="label">中（残り）</span>
            <span id="inCount" class="num">17</span>
        </div>
        <div class="box">
            <span class="label">外（合計）</span>
            <span id="outCount" class="num">9</span>
        </div>
    </div>

    <button id="hitBtn" class="hit-btn">中を当てた！</button>

    <div class="footer-btns">
        <button id="undoBtn" class="undo-btn">１人戻す</button>
        <button id="resetBtn" class="reset-btn">リセット</button>
    </div>

    <div id="message" class="finish-msg"></div>
</div>

<script>
    let currentIn = 17;
    let currentOut = 9;
    const history = []; // 救済用の履歴

    const inDisp = document.getElementById('inCount');
    const outDisp = document.getElementById('outCount');
    const hitBtn = document.getElementById('hitBtn');
    const undoBtn = document.getElementById('undoBtn');
    const resetBtn = document.getElementById('resetBtn');
    const message = document.getElementById('message');

    function update() {
        inDisp.textContent = currentIn;
        outDisp.textContent = currentOut;
        
        // 中が0人になったら終了
        hitBtn.disabled = (currentIn === 0);
        undoBtn.disabled = (history.length === 0);
        message.textContent = (currentIn === 0) ? "中が全滅しました！" : "";
    }

    // メインボタン：当てた
    hitBtn.addEventListener('click', () => {
        if (currentIn > 0) {
            history.push({ in: currentIn, out: currentOut });
            currentIn--;
            currentOut++;
            update();
        }
    });

    // 救済：間違えて押したとき
    undoBtn.addEventListener('click', () => {
        if (history.length > 0) {
            const last = history.pop();
            currentIn = last.in;
            currentOut = last.out;
            update();
        }
    });

    // 最初から
    resetBtn.addEventListener('click', () => {
        if (confirm("人数を初期状態（外9・中17）に戻しますか？")) {
            currentIn = 17;
            currentOut = 9;
            history.length = 0;
            update();
        }
    });

    update();
</script>

</body>
</html>
